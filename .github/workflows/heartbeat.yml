name: 24-7 Stream Heartbeat

on:
  schedule:
    # This runs every 6 hours (4 times a day)
    - cron: '0 */6 * * *'
  workflow_dispatch: # This lets you run it manually for testing

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Poke Hugging Face Space
        run: |
          # Replace the URL below with your actual .hf.space link
          curl -Is https://captain-exe-lofi-radio.hf.space/ | head -n 1
